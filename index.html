<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6e7,#ffeef5);
text-align:center;
overflow:hidden;
}

/* title */

h2{
margin-top:40px;
color:#ff3d7f;
}

/* gift box */

.gift{
width:200px;
height:200px;
background:white;
margin:100px auto;
border-radius:10px;
position:relative;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.ribbonH{
position:absolute;
top:90px;
width:100%;
height:20px;
background:#ff4d6d;
}

.ribbonV{
position:absolute;
left:90px;
height:100%;
width:20px;
background:#ff4d6d;
}

.tap{
position:absolute;
top:-40px;
width:100%;
color:#ff3d7f;
font-weight:bold;
}

/* balloons */

.balloon{
position:absolute;
bottom:-150px;
width:60px;
height:80px;
background:pink;
border-radius:50%;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* message */

.message{
display:none;
font-size:30px;
color:#ff3d7f;
margin-top:50px;
}

</style>
</head>

<body>

<h2>This is your sign to surprise someone special 🎀</h2>

<div class="gift" onclick="openGift()">

<div class="tap">TAP TO OPEN YOUR GIFT</div>

<div class="ribbonH"></div>
<div class="ribbonV"></div>

</div>

<div class="message" id="msg">
🎉 Happy Birthday [HER NAME] 🎉
</div>

<audio autoplay loop>
<source src="song.mp3">
</audio>

<script>

function openGift(){

document.querySelector(".gift").style.display="none";

document.getElementById("msg").style.display="block";

/* balloons */

for(let i=0;i<20;i++){

let b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"vw";

b.style.background="hsl("+Math.random()*360+",70%,70%)";

b.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(b);

}

}

</script>

</body>
</html>
