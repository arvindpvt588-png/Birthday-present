<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(120deg,#ff9bd3,#ffc3e6,#ffd8f0);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
text-align:center;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0%}
100%{background-position:100%}
}

h1{
margin-top:40px;
color:white;
text-shadow:0 0 20px #ff4da6;
}

/* intro */

.intro{
margin-top:80px;
font-size:22px;
color:white;
animation:fade 3s;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px)}
to{opacity:1}
}

/* gift */

.gift{
width:200px;
height:200px;
margin:80px auto;
position:relative;
cursor:pointer;
perspective:800px;
}

.box{
width:200px;
height:200px;
background:#ff4da6;
border-radius:12px;
position:absolute;
}

.lid{
width:200px;
height:40px;
background:#ff1a8c;
position:absolute;
top:-40px;
border-radius:8px;
transition:transform 1s;
transform-origin:bottom;
}

.ribbonV{
position:absolute;
width:20px;
height:200px;
background:white;
left:90px;
}

.ribbonH{
position:absolute;
height:20px;
width:200px;
background:white;
top:90px;
}

/* cake */

.cake{
display:none;
width:220px;
margin:60px auto;
position:relative;
}

.layer{
height:60px;
background:#ff7aa2;
border-radius:10px;
margin-top:6px;
box-shadow:0 6px #d45b82;
}

.icing{
height:20px;
background:white;
border-radius:10px;
position:relative;
top:-10px;
}

/* candle */

.candle{
width:18px;
height:60px;
background:white;
position:absolute;
left:101px;
top:-60px;
cursor:pointer;
border-radius:4px;
}

.flame{
width:20px;
height:30px;
background:radial-gradient(circle,yellow,orange,red);
border-radius:50%;
position:absolute;
top:-25px;
left:-1px;
animation:flicker .2s infinite;
box-shadow:0 0 20px orange;
}

@keyframes flicker{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(.9)}
}

/* balloons */

.balloon{
position:fixed;
bottom:-100px;
width:60px;
height:80px;
border-radius:50%;
animation:rise 8s linear infinite;
}

@keyframes rise{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* gallery */

.gallery{
display:none;
margin-top:40px;
}

.gallery img{
width:300px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

/* letter */

.letter{
display:none;
width:70%;
margin:40px auto;
font-size:20px;
line-height:1.6;
background:rgba(255,255,255,.3);
padding:30px;
border-radius:12px;
}

/* fireworks */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🎉 A Little Surprise 🎉</h1>

<div class="intro">
Someone very special deserves something special today…
</div>

<audio autoplay loop>
<source src="song.mp3">
</audio>

<!-- gift -->

<div class="gift" onclick="openGift()">

<div class="lid" id="lid"></div>

<div class="box">
<div class="ribbonV"></div>
<div class="ribbonH"></div>
</div>

</div>

<!-- cake -->

<div class="cake" id="cake">

<div class="candle" onclick="blow()">
<div class="flame" id="flame"></div>
</div>

<div class="icing"></div>
<div class="layer"></div>
<div class="layer"></div>

</div>

<!-- gallery -->

<div class="gallery" id="gallery">
<img id="photo" src="photo1.jpg">
</div>

<!-- letter -->

<div class="letter" id="letter"></div>

<canvas id="fireworks"></canvas>

<script>

/* gift open */

function openGift(){

document.getElementById("lid").style.transform="rotateX(-120deg)";

setTimeout(()=>{
document.querySelector(".gift").style.display="none";
document.getElementById("cake").style.display="block";
spawnBalloons();
},1000);

}

/* balloons */

function spawnBalloons(){

for(let i=0;i<15;i++){

let b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"vw";

b.style.background="hsl("+Math.random()*360+",70%,70%)";

b.style.animationDuration=(5+Math.random()*4)+"s";

document.body.appendChild(b);

}

}

/* candle */

function blow(){

document.getElementById("flame").style.display="none";

startFireworks();

document.getElementById("gallery").style.display="block";

startGallery();

typeLetter();

}

/* gallery slider */

let photos=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg"];
let index=0;

function startGallery(){

setInterval(()=>{

index=(index+1)%photos.length;

document.getElementById("photo").src=photos[index];

},3000);

}

/* letter typing */

let text=`Dear [HER NAME],

Today is a reminder that the world became brighter the day you were born.

Your smile, your kindness, and your presence make life more beautiful.

I made this small surprise just to celebrate you.

May your life always be filled with happiness and unforgettable moments.

Happy Birthday.

— Arvind ❤️`;

let i=0;

function typeLetter(){

document.getElementById("letter").style.display="block";

let t=setInterval(()=>{

document.getElementById("letter").innerHTML+=text[i];

i++;

if(i>=text.length) clearInterval(t);

},40);

}

/* fireworks */

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function startFireworks(){

setInterval(()=>{

for(let j=0;j<60;j++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
dx:(Math.random()-0.5)*6,
dy:(Math.random()-0.5)*6,
size:Math.random()*3

});

}

},400);

animate();

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.dx;
p.y+=p.dy;

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

});

requestAnimationFrame(animate);

}

</script>

</body>
</html>
