<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday to Tashvuu❤️</title>

<style>
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
top:0;
left:0;
z-index:999;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
color:white;
}

#introText{
animation:fadeIn 3s ease;
}

#introText p{
opacity:0;
animation:fade 3s forwards;
}

.line1{animation-delay:1s;}
.line2{animation-delay:3s;}
.line3{animation-delay:5s;}

.name{
font-size:60px;
color:pink;
text-shadow:0 0 20px pink;
opacity:0;
animation:fade 3s forwards;
animation-delay:7s;
}

button{
margin-top:40px;
padding:15px 30px;
font-size:18px;
background:#ff4d6d;
border:none;
color:white;
border-radius:30px;
cursor:pointer;
opacity:0;
animation:fade 2s forwards;
animation-delay:9s;
}

@keyframes fade{
to{opacity:1;}
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}
body{
margin:0;
background:#0b0b2b;
font-family:Arial;
color:white;
text-align:center;
overflow-x:hidden;
}

/* stars background */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:moveStars 50s linear infinite;
z-index:-1;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

/* title */

h1{
margin-top:40px;
font-size:50px;
text-shadow:0 0 20px pink;
}

/* gift box */

.gift{
width:150px;
height:150px;
background:#ff4d6d;
margin:80px auto;
position:relative;
cursor:pointer;
}

.gift:before{
content:"";
position:absolute;
width:150px;
height:20px;
background:white;
top:65px;
}

.gift:after{
content:"";
position:absolute;
height:150px;
width:20px;
background:white;
left:65px;
}

.gift span{
position:absolute;
top:-40px;
left:0;
right:0;
font-size:20px;
}

/* cake */

.cake{
display:none;
width:200px;
height:120px;
background:#ff85a2;
margin:40px auto;
border-radius:10px;
position:relative;
}

.candle{
width:15px;
height:50px;
background:white;
position:absolute;
top:-50px;
left:92px;
cursor:pointer;
}

.flame{
width:20px;
height:20px;
background:orange;
border-radius:50%;
position:absolute;
top:-15px;
left:-3px;
animation:flicker .2s infinite;
}

@keyframes flicker{
0%{transform:scale(1)}
100%{transform:scale(1.3)}
}

/* gallery */

.gallery{
margin-top:40px;
display:none;
}

.gallery img{
width:300px;
border-radius:10px;
}

/* buttons */

button{
margin:10px;
padding:10px 20px;
border:none;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* letter */

.letter{
display:none;
width:70%;
margin:40px auto;
font-size:20px;
line-height:1.7;
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:15px;
min-height:150px;
}

/* hearts */

.heart{
position:fixed;
color:pink;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>
<div id="intro">

<canvas id="stars"></canvas>

<div id="introText">
<p class="line1">Tonight the universe has a message...</p>
<p class="line2">Someone special was born.</p>
<p class="line3">And this little universe is made just for</p>
<h1 class="name">[HER NAME]</h1>

<button onclick="enterSite()">Open Your Surprise ✨</button>
</div>

</div>
<div class="stars"></div>

<h1>🎉 Wishing You a Many Many return of the day Happy Birthday My kajukatliii❤️🫠🤌🏻 🎉</h1>

<audio autoplay loop>
<source src="song.mp3">
</audio>

<div class="gift" onclick="openGift()">
<span>Click to open 🎁</span>
</div>

<div class="cake" id="cake">

<div class="candle" onclick="blow()">
<div class="flame" id="flame"></div>
</div>

</div>

<div class="gallery" id="gallery">

<img id="photo" src="photo1.jpg">

<br>

<button onclick="prev()">◀</button>
<button onclick="next()">▶</button>

</div>

<div class="letter" id="letter"></div>

<canvas id="fireworks"></canvas>

<script>

/* open gift */

function openGift(){
document.querySelector(".gift").style.display="none";
document.getElementById("cake").style.display="block";
}

/* blow candle */

function blow(){

document.getElementById("flame").style.display="none";

startFireworks();

document.getElementById("gallery").style.display="block";

typeLetter();

}

/* photo slider */

let photos=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg"
];

let i=0;

function next(){
i=(i+1)%photos.length;
document.getElementById("photo").src=photos[i];
}

function prev(){
i=(i-1+photos.length)%photos.length;
document.getElementById("photo").src=photos[i];
}

/* typewriter letter */

let text=`Dear Tashviiii ,

Today the universe celebrates the day someone truly special was born.

Your smile has a way of making ordinary moments unforgettable.

I made this little surprise just to remind you how amazing you are.

May your life be filled with laughter, dreams, adventures, and endless happiness.

Happy Birthday once again.

— Arvind ❤️`;

let index=0;

function typeLetter(){

document.getElementById("letter").style.display="block";

let interval=setInterval(function(){

document.getElementById("letter").innerHTML+=text[index];

index++;

if(index>=text.length){
clearInterval(interval);
}

},40);

}

/* hearts */

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},400);

/* fireworks */

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function startFireworks(){

setInterval(()=>{

for(let j=0;j<60;j++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
dx:(Math.random()-0.5)*6,
dy:(Math.random()-0.5)*6,
size:Math.random()*3
});

}

},500);

animate();

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.dx;
p.y+=p.dy;

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle="yellow";
ctx.fill();

});

requestAnimationFrame(animate);

}

</script>
function enterSite(){
document.getElementById("intro").style.display="none";
}
</body>
</html>
